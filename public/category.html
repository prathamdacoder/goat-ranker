<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Search Console Verification (optional - paste yours if you want) -->
    <!-- <meta name="google-site-verification" content="YOUR_CODE_HERE" /> -->
    
    <title id="pageTitle">GOAT Ranker</title>
    <meta id="pageDesc" name="description" content="Vote for the GOAT.">
    <meta name="robots" content="index, follow">
    
    <link rel="canonical" id="canonicalLink" href="https://goat-ranker.onrender.com">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav">
        <a href="/" style="text-decoration:none;color:inherit;">
            <h1>GOAT<span>RANKER</span></h1>
        </a>
        <p id="categoryLabel">Loading...</p>
        <a href="/" class="back-btn">← All Categories</a>
    </div>

    <div class="container">
        <div class="leaderboard-header">
            <h2 id="leaderboardTitle">🏆 TOP 10</h2>
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>

        <div id="rankList" class="leaderboard">
            <p style="text-align:center;color:#666;padding:40px;">Loading rankings...</p>
        </div>

        <div class="add-section-new">
            <h3>Don't see your favorite? Add it!</h3>
            <div class="add-input-row">
                <input id="nameInput" placeholder="Type a name..." maxlength="50">
                <button onclick="addItem()">ADD 🚀</button>
            </div>
        </div>
    </div>

    <script>
        // ===== Get category from URL =====
        const category = window.location.pathname.replace('/', '');
        
        // ===== Category info (SEO + display) =====
        const categoryInfo = {
            youtubers: { 
                title: "Best YouTubers Ranked 2026 🐐 | Vote MrBeast vs IShowSpeed",
                desc: "Who's the best YouTuber? Vote MrBeast, IShowSpeed, Kai Cenat and more. Real-time community rankings.",
                emoji: "🎬", 
                label: "Top YouTubers" 
            },
            games: { 
                title: "Best Games Ranked 2026 🎮 | Fortnite vs Minecraft vs GTA",
                desc: "What's the best game of all time? Vote Fortnite vs Minecraft vs GTA 6. Real-time gaming rankings.",
                emoji: "🎮", 
                label: "Top Games" 
            },
            drinks: { 
                title: "Best Drinks Ranked 🥤 | Prime vs Red Bull vs Monster",
                desc: "What's the best drink? Vote Prime, Red Bull, Monster, Coke and more. Community-ranked beverage list.",
                emoji: "🥤", 
                label: "Top Drinks" 
            },
            music: { 
                title: "Best Music Artists 🎵 | Drake vs Kendrick vs Taylor",
                desc: "Who's the GOAT musician? Vote Drake, Kendrick, Taylor Swift and more. Real-time music rankings.",
                emoji: "🎵", 
                label: "Top Music Artists" 
            },
            sports: { 
                title: "Best Athletes Ranked ⚽ | Messi vs Ronaldo vs LeBron",
                desc: "Who's the GOAT athlete? Vote Messi vs Ronaldo, LeBron vs Jordan. Real-time sports rankings.",
                emoji: "⚽", 
                label: "Top Athletes" 
            },
            other: { 
                title: "Random GOAT Rankings 🐐 | Vote Anything",
                desc: "Vote on anything. Random community rankings for the greatest of all time.",
                emoji: "🐐", 
                label: "Other Rankings" 
            }
        };

        const info = categoryInfo[category] || categoryInfo.other;
        
        // Update page SEO
        document.getElementById('pageTitle').textContent = info.title + " | GOAT Ranker";
        document.getElementById('pageDesc').setAttribute('content', info.desc);
        document.getElementById('categoryLabel').textContent = `${info.emoji} ${info.label}`;
        document.getElementById('leaderboardTitle').textContent = `${info.emoji} TOP 10 ${info.label.toUpperCase()}`;
        document.getElementById('canonicalLink').setAttribute('href', `https://goat-ranker.onrender.com/${category}`);
        document.title = info.title + " | GOAT Ranker";

        // ===== Helper Functions =====
        
        // Format big numbers (343000000 → "343.0M")
        function formatStat(num) {
            if (!num || num === 0) return "0";
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
            if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
            if (num >= 1000) return (num / 1000).toFixed(1) + "K";
            return num.toString();
        }

        // Get medal for top 3, rank number for rest
        function getMedal(index) {
            if (index === 0) return '<span class="medal gold">👑</span>';
            if (index === 1) return '<span class="medal silver">🥈</span>';
            if (index === 2) return '<span class="medal bronze">🥉</span>';
            return `<span class="rank-number">#${index + 1}</span>`;
        }

        // Get trend arrow
        function getTrend(change) {
            if (!change || change === 0) return '<span class="trend neutral">— 0</span>';
            if (change > 0) {
                const hot = change >= 15 ? ' 🔥' : '';
                return `<span class="trend up">📈 +${change}${hot}</span>`;
            }
            return `<span class="trend down">📉 ${change}</span>`;
        }

        // Escape HTML to prevent XSS
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== Load Rankings =====
        async function loadList() {
            try {
                const res = await fetch(`/api/items?category=${category}`);
                const items = await res.json();
                const list = document.getElementById("rankList");
                list.innerHTML = "";

                if (!items || items.length === 0) {
                    list.innerHTML = '<p style="text-align:center;color:#666;padding:40px;">No items yet. Add the first one! 🚀</p>';
                    return;
                }

                // Show only top 10
                const top10 = items.slice(0, 10);
                const maxVotes = Math.max(...top10.map(i => i.votes), 1);

                top10.forEach((item, index) => {
                    const div = document.createElement("div");
                    div.className = `leaderboard-card rank-${index + 1}`;
                    if (index < 3) div.classList.add('top-three');
                    
                    const votePercent = (item.votes / maxVotes) * 100;
                    const newBadge = item.is_new ? '<span class="new-badge">NEW</span>' : '';
                    const safeName = escapeHTML(item.name);
                    const image = item.image || '🐐';
                    const statLabel = item.stat_label || 'community pick';
                    const statDisplay = item.stat > 0 ? formatStat(item.stat) + ' ' + statLabel : '⭐ community pick';

                    div.innerHTML = `
                        <div class="lb-rank">
                            ${getMedal(index)}
                        </div>
                        <div class="lb-image">${image}</div>
                        <div class="lb-info">
                            <div class="lb-name">${safeName} ${newBadge}</div>
                            <div class="lb-stat">${statDisplay}</div>
                            <div class="vote-bar">
                                <div class="vote-bar-fill" style="width: ${votePercent}%"></div>
                            </div>
                        </div>
                        <div class="lb-right">
                            <div class="vote-count-box">
                                <div class="vote-num">${item.votes.toLocaleString()}</div>
                                <div class="vote-label">VOTES</div>
                            </div>
                            ${getTrend(item.weekly_change || 0)}
                            <button class="vote-btn-new" onclick="vote(${item.id}, this)">🔺 VOTE</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                console.error("Failed to load:", err);
                document.getElementById("rankList").innerHTML = 
                    '<p style="text-align:center;color:#ff4444;padding:40px;">Failed to load. Refresh the page.</p>';
            }
        }

        // ===== Vote =====
        async function vote(id, btn) {
            if (btn.disabled) return;
            btn.disabled = true;
            btn.textContent = "✓ VOTED";
            btn.style.background = "#00ff88";
            btn.style.color = "#000";
            
            try {
                await fetch("/api/vote", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id })
                });
                // Reload after short delay
                setTimeout(loadList, 600);
            } catch (err) {
                console.error("Vote failed:", err);
                btn.disabled = false;
                btn.textContent = "🔺 VOTE";
                btn.style.background = "";
                btn.style.color = "";
            }
        }

        // ===== Add Item =====
        async function addItem() {
            const input = document.getElementById("nameInput");
            const name = input.value.trim();
            if (!name) {
                input.placeholder = "Type a name first!";
                input.focus();
                return;
            }
            
            try {
                const res = await fetch("/api/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, category })
                });
                
                if (res.ok) {
                    input.value = "";
                    input.placeholder = "Added! ✅";
                    setTimeout(() => {
                        input.placeholder = "Type a name...";
                    }, 2000);
                    loadList();
                }
            } catch (err) {
                console.error("Add failed:", err);
            }
        }

        // ===== Enter key to add =====
        document.getElementById("nameInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") addItem();
        });

        // ===== Initial load =====
        loadList();

        // ===== Auto-refresh every 10 seconds (LIVE feel) =====
        setInterval(loadList, 10000);
    </script>
</body>
</html>

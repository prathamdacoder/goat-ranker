<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GOAT Ranker</title>
    <meta id="pageDesc" name="description" content="Vote for the GOAT.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐐</text></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav">
        <a href="/" style="text-decoration:none;color:inherit;">
            <h1>GOAT<span>RANKER</span></h1>
        </a>
        <p id="categoryLabel">Loading...</p>
        <a href="/" class="back-btn">← All Categories</a>
    </div>

    <div class="container">
        <div class="leaderboard-header">
            <h2 id="leaderboardTitle">🏆 TOP 10</h2>
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>

        <div id="rankList" class="leaderboard"></div>

        <div class="add-section">
            <h3 style="color:#888; margin-bottom: 15px; text-align:center;">Don't see your favorite?</h3>
            <div style="display:flex; gap:10px;">
                <input id="nameInput" placeholder="Add a new entry..." maxlength="50">
                <button onclick="addItem()">ADD</button>
            </div>
        </div>
    </div>

    <script>
        const category = window.location.pathname.replace('/', '');
        
        const categoryInfo = {
            youtubers: { title: "Best YouTubers Ranked 2026", emoji: "🎬", label: "Top YouTubers" },
            games: { title: "Best Games Ranked 2026", emoji: "🎮", label: "Top Games" },
            drinks: { title: "Best Drinks Ranked", emoji: "🥤", label: "Top Drinks" },
            music: { title: "Best Music Artists", emoji: "🎵", label: "Top Music Artists" },
            sports: { title: "Best Athletes Ranked", emoji: "⚽", label: "Top Athletes" },
            other: { title: "Random Rankings", emoji: "🐐", label: "Other Rankings" }
        };

        const info = categoryInfo[category] || categoryInfo.other;
        document.getElementById('pageTitle').textContent = info.title + " | GOAT Ranker";
        document.getElementById('pageDesc').setAttribute('content', info.title);
        document.getElementById('categoryLabel').textContent = `${info.emoji} ${info.label}`;
        document.getElementById('leaderboardTitle').textContent = `${info.emoji} TOP 10 ${info.label.toUpperCase()}`;
        document.title = info.title + " | GOAT Ranker";

        function formatStat(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
            if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
            if (num >= 1000) return (num / 1000).toFixed(1) + "K";
            return num.toString();
        }

        function getMedal(index) {
            if (index === 0) return '<span class="medal gold">👑</span>';
            if (index === 1) return '<span class="medal silver">🥈</span>';
            if (index === 2) return '<span class="medal bronze">🥉</span>';
            return `<span class="rank-number">#${index + 1}</span>`;
        }

        function getTrend(change) {
            if (change === 0) return '<span class="trend neutral">—</span>';
            if (change > 0) {
                const hot = change >= 15 ? ' 🔥' : '';
                return `<span class="trend up">📈 +${change}${hot}</span>`;
            }
            return `<span class="trend down">📉 ${change}</span>`;
        }

        async function loadList() {
            const res = await fetch(`/api/items?category=${category}`);
            const items = await res.json();
            const list = document.getElementById("rankList");
            list.innerHTML = "";

            if (items.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#666;padding:40px;">No items yet. Add the first one! 🚀</p>';
                return;
            }

            // Show only top 10
            const top10 = items.slice(0, 10);
            const maxVotes = Math.max(...top10.map(i => i.votes));

            top10.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = `leaderboard-card rank-${index + 1}`;
                if (index < 3) div.classList.add('top-three');
                
                const votePercent = (item.votes / maxVotes) * 100;
                const newBadge = item.isNew ? '<span class="new-badge">NEW</span>' : '';

                div.innerHTML = `
                    <div class="lb-rank">
                        ${getMedal(index)}
                    </div>
                    <div class="lb-image">${item.image || '🐐'}</div>
                    <div class="lb-info">
                        <div class="lb-name">${item.name} ${newBadge}</div>
                        <div class="lb-stat">${item.stat > 0 ? formatStat(item.stat) + ' ' + item.statLabel : '⭐ community pick'}</div>
                        <div class="vote-bar">
                            <div class="vote-bar-fill" style="width: ${votePercent}%"></div>
                        </div>
                    </div>
                    <div class="lb-right">
                        <div class="vote-count-box">
                            <div class="vote-num">${item.votes.toLocaleString()}</div>
                            <div class="vote-label">VOTES</div>
                        </div>
                        ${getTrend(item.weeklyChange || 0)}
                        <button class="vote-btn-new" onclick="vote(${item.id})">🔺 VOTE</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function vote(id) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = "✓ VOTED";
            await fetch("/api/vote", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id })
            });
            setTimeout(loadList, 500);
        }

        async function addItem() {
            const input = document.getElementById("nameInput");
            const name = input.value.trim();
            if (!name) return;
            await fetch("/api/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, category })
            });
            input.value = "";
            loadList();
        }

        document.getElementById("nameInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") addItem();
        });

        loadList();
        // Auto-refresh every 10 seconds for live feel
        setInterval(loadList, 10000);
    </script>
</body>
</html>
